<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TasTik.Food – Pi Testnet</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7faf9;
      color: #1f2937;
      text-align: center;
    }
    .container {
      max-width: 420px;
      margin: auto;
      padding: 40px 20px;
    }
    img {
      width: 90px;
      margin-bottom: 20px;
    }
    h1 {
      color: #047857;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      margin-bottom: 30px;
    }
    button {
      background: #10b981;
      border: none;
      color: white;
      padding: 14px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #059669;
    }
    .note {
      margin-top: 25px;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.png" alt="TasTik Logo" />
    <h1>TasTik.Food</h1>
    <p>
      Discover nearby halal food places and support local restaurants using Pi.
    </p>

    <button onclick="payWithPi()">Support with Pi (Test)</button>

    <div class="note">
      Pi Network Testnet App – No real Pi is used.
    </div>
  </div>

  <script>
    Pi.init({ version: "2.0", sandbox: true });

    function payWithPi() {
      Pi.authenticate(
        ["username", "payments"],
        "TasTik.Food Test Payment"
      )
        .then(() => {
          return Pi.createPayment(
            {
              amount: 0.01,
              memo: "TasTik Featured Listing Test",
              metadata: {
                app: "TasTik.Food",
                purpose: "test_payment"
              }
            },
            {
              onReadyForServerApproval: function (paymentId) {
                console.log("Ready for approval:", paymentId);
              },
              onReadyForServerCompletion: function (paymentId, txid) {
                alert("Payment successful 🎉 Test-Pi received");
              },
              onCancel: function () {
                alert("Payment cancelled");
              },
              onError: function (error) {
                console.error(error);
                alert("Payment failed");
              }
            }
          );
        })
        .catch(() => {
          alert("Pi authentication failed");
        });
    }
  </script>
</body>
</html>
