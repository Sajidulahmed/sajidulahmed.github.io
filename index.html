<script 
src="https://sdk.minepi.com/pi-sdk.js"><
/script>

<script>
  Pi.init({ version: "2.0", sandbox: 
true });

  function setupPayment() {
    const btn = 
document.getElementById("payBtn");

    if (!btn) {
      setTimeout(setupPayment, 500); // 
retry
      return;
    }

    btn.onclick = async function () {
      alert("Clicked ✅");

      try {
        await Pi.createPayment({
          amount: 0.1,
          memo: "Tastik Food Order 🍔",
          metadata: { orderId: "1234" }
        }, {
          onReadyForServerApproval: 
function(paymentId) {
            return true;
           },
          onReadyForServerCompletion: 
function(paymentId, txid) {
            alert("Payment Done ✅");
            return true;
          },
          onCancel: function(paymentId) {
            alert("Cancelled ❌");
          },
          onError: function(error) {
            console.error(error);
            alert("Error ⚠️");
          }
        });

      } catch (e) {
        console.error(e);
      }
    };
  }

  setupPayment();
</script>
