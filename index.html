<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TasTik.Food – Pi Testnet</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script>
    Pi.init({ version: "2.0", sandbox: true });
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7faf9;
      text-align: center;
      padding: 40px 20px;
      color: #0f5132;
    }
    h1 {
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      margin-bottom: 25px;
    }
    button {
      background: #0f9d58;
      color: #fff;
      border: none;
      padding: 14px 26px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    button:active {
      opacity: 0.85;
    }
    .note {
      margin-top: 20px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>

<body>

  <h1>TasTik.Food</h1>
  <p>Discover nearby halal food places and support local restaurants using Pi.</p>

  <button onclick="payWithPi()">Support with Pi (Test)</button>

  <div class="note">
    Pi Network Testnet App — No real Pi is used
  </div>

  <script>
    async function payWithPi() {
      try {
        const payment = await Pi.createPayment({
          amount: 0.01,
          memo: "TasTik Test Support",
          metadata: { app: "TasTik.Food" }
        });

        alert("Payment initiated successfully!");
        console.log(payment);

      } catch (err) {
        alert("Payment cancelled or failed");
        console.error(err);
      }
    }
  </script>

</body>
</html>
